{% if page_obj and page_obj.has_other_pages %}

    <nav
        class="mt-4"
        aria-label="Page navigation"
    >

        <ul class="pagination justify-content-center flex-wrap gap-1">

            {% if page_obj.has_previous %}

                <li class="page-item">
                    <a
                        class="page-link"
                        href="?{% if pagination_query %}{{ pagination_query }}&{% endif %}page={{ page_obj.previous_page_number }}"
                    >
                        Previous
                    </a>
                </li>

            {% endif %}

            {% for num in page_obj.paginator.page_range %}

                <li class="page-item {% if page_obj.number == num %}active{% endif %}">
                    <a
                        class="page-link"
                        href="?{% if pagination_query %}{{ pagination_query }}&{% endif %}page={{ num }}"
                    >
                        {{ num }}
                    </a>
                </li>

            {% endfor %}

            {% if page_obj.has_next %}

                <li class="page-item">
                    <a
                        class="page-link"
                        href="?{% if pagination_query %}{{ pagination_query }}&{% endif %}page={{ page_obj.next_page_number }}"
                    >
                        Next
                    </a>
                </li>

            {% endif %}

        </ul>

    </nav>

{% endif %}
