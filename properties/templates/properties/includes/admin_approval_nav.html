<div class="row g-3 mb-4">

    <div class="col-md-3">

        <a
            href="{% url 'payment_confirmation_requests' %}"
            class="text-decoration-none"
        >
            <div class="card border-0 shadow-sm h-100 {% if active_admin_tab == 'payments' %}border-start border-4 border-primary{% endif %}">
                <div class="card-body">
                    <small class="text-muted">Featured Payments</small>
                    <h3 class="fw-bold mb-0">{{ pending_payment_requests }}</h3>
                    <span class="text-muted">awaiting confirmation</span>
                </div>
            </div>
        </a>

    </div>

    <div class="col-md-3">

        <a
            href="{% url 'listing_approval_requests' %}"
            class="text-decoration-none"
        >
            <div class="card border-0 shadow-sm h-100 {% if active_admin_tab == 'listings' %}border-start border-4 border-primary{% endif %}">
                <div class="card-body">
                    <small class="text-muted">Listing Approval</small>
                    <h3 class="fw-bold mb-0">{{ pending_listing_requests }}</h3>
                    <span class="text-muted">ready for review</span>
                </div>
            </div>
        </a>

    </div>

    <div class="col-md-3">

        <a
            href="{% url 'featured_listing_management' %}"
            class="text-decoration-none"
        >
            <div class="card border-0 shadow-sm h-100 {% if active_admin_tab == 'featured' %}border-start border-4 border-primary{% endif %}">
                <div class="card-body">
                    <small class="text-muted">Featured Listings</small>
                    <h3 class="fw-bold mb-0">Manage</h3>
                    <span class="text-muted">approved listings</span>
                </div>
            </div>
        </a>

    </div>

</div>

<div class="row g-3 mb-4">

    <div class="col-md-3">

        <a
            href="{% url 'contact_unlock_payment_requests' %}"
            class="text-decoration-none"
        >
            <div class="card border-0 shadow-sm h-100 {% if active_admin_tab == 'contact_unlocks' %}border-start border-4 border-primary{% endif %}">
                <div class="card-body">
                    <small class="text-muted">Contact Unlocks</small>
                    <h3 class="fw-bold mb-0">{{ pending_contact_unlock_requests }}</h3>
                    <span class="text-muted">awaiting confirmation</span>
                </div>
            </div>
        </a>

    </div>

</div>
