{% extends 'base.html' %}

{% block title %}
Upload Image
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="card shadow-sm">

        <div class="card-body">

            <h2>

                Upload Image

            </h2>

            <p>

                {{ listing.title }}

            </p>

            <form
                method="post"
                enctype="multipart/form-data"
            >

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="btn btn-primary"
                >
                    Upload
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
