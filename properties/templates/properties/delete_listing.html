{% extends 'base.html' %}

{% block title %}
    Delete Listing
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-sm border-danger">

                <div class="card-body">

                    <h2 class="text-danger">
                        Delete Listing
                    </h2>

                    <p>
                        Are you sure you want to delete:
                    </p>

                    <h5>
                        {{ listing.title }}
                    </h5>

                    <form method="post">

                        {% csrf_token %}

                        <button
                            type="submit"
                            class="btn btn-danger"
                        >
                            Yes, Delete
                        </button>

                        <a
                            href="{% url 'my_listings' %}"
                            class="btn btn-secondary"
                        >
                            Cancel
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
