{% extends 'base.html' %}

{% block title %}
Create Listing
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h2 class="mb-4">

                        Create Listing

                    </h2>

                    <form method="post">

                        {% csrf_token %}

                        <div class="mb-3">


<label class="form-label">

    Category

</label>

{{ form.category }}


</div>

<div class="mb-3">


<label class="form-label">

    Listing Title

</label>

{{ form.title }}


</div>

<div class="mb-3">


<label class="form-label">

    Description

</label>

{{ form.description }}


</div>

<div class="mb-3">


<label class="form-label">

    Location

</label>

{{ form.location }}


</div>

<div class="mb-4">


<label class="form-label">

    Price (TZS)

</label>

{{ form.price }}


</div>


                        <button
    type="submit"
    class="btn btn-primary w-100"
>
    Publish Listing
</button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
