{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="container py-5">


<div class="row justify-content-center">

    <div class="col-md-6 col-lg-5">

        <div class="card shadow border-0">

            <div class="card-body p-4">

                <h2 class="text-center fw-bold mb-4">

                    Welcome Back

                </h2>

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Username

                        </label>

                        {{ form.username }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Password

                        </label>

                        {{ form.password }}

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100"
                    >
                        Login
                    </button>

                </form>

                <hr>

                <p class="text-center mb-0">

                    Don't have an account?

                    <a href="{% url 'register' %}">

                        Create Account

                    </a>

                </p>

            </div>

        </div>

    </div>

</div>


</div>

{% endblock %}
